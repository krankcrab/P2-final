<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>P2 Final Study Guide</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #0a0e1a; color: #f1f5f9; font-family: 'Segoe UI', system-ui, sans-serif; min-height: 100vh; }
  button { font-family: inherit; cursor: pointer; }

/* Header */
#header { background: linear-gradient(135deg,#0f172a,#111827); border-bottom: 1px solid #1e293b; padding: 18px 24px; }
#header-inner { max-width: 820px; margin: 0 auto; }
#header h1 { font-size: 20px; font-weight: 900; font-family: Georgia, serif; color: #f1f5f9; }
#header p { color: #475569; font-size: 13px; margin-top: 3px; }
#topic-pills { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 14px; }
.pill { padding: 5px 12px; border-radius: 20px; border: 1px solid #1e293b; background: transparent; color: #475569; font-size: 12px; font-weight: 400; transition: all .15s; white-space: nowrap; }
.pill.active { font-weight: 700; }

/* Tabs */
#tabs { border-bottom: 1px solid #1e293b; background: #0f172a; }
#tabs-inner { max-width: 820px; margin: 0 auto; display: flex; }
.tab { padding: 13px 20px; border: none; border-bottom: 2px solid transparent; background: transparent; color: #475569; font-size: 14px; font-weight: 400; transition: all .15s; }
.tab.active { color: #3b82f6; border-bottom-color: #3b82f6; font-weight: 700; }
#restart-btn { padding: 13px 20px; border: none; background: transparent; color: #64748b; font-size: 13px; margin-left: auto; }

/* Content */
#content { max-width: 820px; margin: 0 auto; padding: 28px 24px; }

/* Progress bar */
#progress-wrap { display: flex; align-items: center; gap: 12px; margin-bottom: 20px; }
#progress-bar-bg { flex: 1; height: 6px; background: #1e293b; border-radius: 3px; }
#progress-bar-fill { height: 100%; border-radius: 3px; transition: width .4s; }
#progress-text { color: #64748b; font-size: 13px; min-width: 70px; text-align: right; }

/* Topic badge */
.topic-badge { display: inline-block; border-radius: 4px; padding: 3px 10px; font-size: 11px; font-weight: 700; letter-spacing: 1px; text-transform: uppercase; border: 1px solid; }
.q-num { color: #334155; font-size: 12px; margin-left: 10px; }

/* Question card */
#question-card { background: #111827; border-radius: 12px; padding: 24px 24px 20px; margin-bottom: 16px; border: 1px solid #1e293b; }
#question-card p { color: #f1f5f9; font-size: 17px; line-height: 1.65; font-weight: 600; }

/* Options */
#options { display: grid; gap: 10px; margin-bottom: 20px; }
.option-btn { background: #111827; border: 1px solid #1e293b; border-radius: 10px; padding: 14px 18px; color: #94a3b8; font-size: 15px; text-align: left; transition: all .15s; display: flex; align-items: flex-start; gap: 12px; line-height: 1.5; }
.option-btn:hover:not(.answered) { border-color: #3b82f6; color: #f1f5f9; }
.option-btn.correct { background: #14532d33; border-color: #22c55e; color: #22c55e; }
.option-btn.wrong { background: #7f1d1d33; border-color: #ef4444; color: #ef4444; }
.opt-letter { border-radius: 4px; padding: 1px 7px; font-size: 12px; font-weight: 800; flex-shrink: 0; margin-top: 1px; }

/* Feedback */
#feedback-row { display: flex; gap: 10px; align-items: center; margin-bottom: 12px; }
#feedback-box { flex: 1; padding: 14px; border-radius: 8px; font-size: 14px; font-weight: 700; border: 1px solid; }
#feedback-box.correct { background: #14532d22; border-color: #22c55e44; color: #22c55e; }
#feedback-box.wrong { background: #7f1d1d22; border-color: #ef444444; color: #ef4444; }
#next-btn { padding: 14px 28px; border-radius: 8px; border: none; background: #3b82f6; color: #fff; font-weight: 700; font-size: 15px; flex-shrink: 0; }

/* Score strip */
#score-strip { display: flex; gap: 16px; padding: 10px 0; border-top: 1px solid #1e293b; font-size: 13px; }

/* Results screen */
#results { text-align: center; padding: 40px 20px; }
#results .emoji { font-size: 72px; margin-bottom: 12px; }
#results h2 { font-size: 28px; font-weight: 900; font-family: Georgia, serif; color: #f1f5f9; margin-bottom: 8px; }
#results .sub { color: #64748b; font-size: 15px; margin-bottom: 32px; }
#score-boxes { display: flex; justify-content: center; gap: 40px; margin-bottom: 40px; }
.score-box-val { font-size: 48px; font-weight: 900; }
.score-box-label { color: #64748b; font-size: 13px; }
#wrong-list-title { color: #ef4444; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 12px; text-align: left; }
.wrong-item { background: #1e293b; border: 1px solid #ef444433; border-radius: 8px; padding: 14px; margin-bottom: 8px; text-align: left; }
.wrong-item .wi-meta { color: #94a3b8; font-size: 12px; margin-bottom: 4px; }
.wrong-item .wi-q { color: #f1f5f9; font-size: 14px; margin-bottom: 6px; }
.wrong-item .wi-ans { color: #22c55e; font-size: 13px; }
#try-again-btn { padding: 14px 36px; border-radius: 8px; border: none; background: #3b82f6; color: #fff; font-weight: 700; font-size: 16px; margin-top: 24px; }

/* Browse mode */
#browse-search { width: 100%; padding: 12px 16px; border-radius: 8px; border: 1px solid #1e293b; background: #111827; color: #f1f5f9; font-size: 15px; margin-bottom: 12px; outline: none; }
#browse-count { color: #64748b; font-size: 13px; margin-bottom: 16px; }
.browse-card { background: #111827; border: 1px solid #1e293b; border-radius: 10px; padding: 18px; margin-bottom: 12px; transition: border-color .2s; }
.browse-card-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
.browse-q { color: #cbd5e1; font-size: 15px; line-height: 1.6; margin-bottom: 12px; }
.browse-opt { padding: 8px 12px; border-radius: 6px; font-size: 13px; background: #0f172a; color: #64748b; border: 1px solid #1e293b; margin-bottom: 5px; display: flex; gap: 8px; line-height: 1.5; }
.browse-opt.revealed-correct { background: #14532d33; color: #22c55e; border-color: #22c55e55; font-weight: 700; }
.browse-opt.revealed-wrong { color: #374151; }
.reveal-btn { background: none; border: 1px solid #1e293b; border-radius: 6px; color: #64748b; font-size: 12px; padding: 3px 10px; }

/* Stats mode */
#stats-title { color: #94a3b8; font-size: 13px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; margin-bottom: 24px; }
.stat-row { margin-bottom: 10px; }
.stat-row-label { display: flex; justify-content: space-between; margin-bottom: 5px; }
.stat-label { color: #cbd5e1; font-size: 14px; }
.stat-count { font-size: 14px; font-weight: 700; }
.stat-bar-bg { height: 8px; background: #1e293b; border-radius: 4px; }
.stat-bar-fill { height: 100%; border-radius: 4px; }
#summary-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 32px; }
.summary-card { background: #111827; border: 1px solid #1e293b; border-radius: 10px; padding: 20px; text-align: center; }
.summary-val { font-size: 36px; font-weight: 900; }
.summary-label { color: #64748b; font-size: 13px; margin-top: 4px; }

#hidden { display: none !important; }
@media(max-width:600px){
#score-boxes{gap:20px;}
.score-box-val{font-size:36px;}
#results h2{font-size:22px;}
#question-card p{font-size:15px;}
.option-btn{font-size:14px;}
}
</style>

</head>

<div id="header">
  <div id="header-inner">

<script>
const ALL_QUESTIONS = [
  {id:1,q:"Most of the blood's formed elements are:",o:["Platelets","Leukocytes","Electrolytes","Erythrocytes"],a:3,t:"Hematology"},
  {id:2,q:"Which of the following is a common sign of bleeding in the upper gastrointestinal tract?",o:["Hematochezia","Vomitus","Gross bleeding","Melena"],a:3,t:"GI"},
  {id:3,q:"Which of the following is an example of a local effect of a hazardous material?",o:["Blood in the urine","Restlessness","Nausea and vomiting","Blister formation"],a:3,t:"Hazmat"},
  {id:4,q:"Which of the following is a proper technique when accessing an implantable venous access device?",o:["Aspirate 5 mL of blood and then block the flow with the crimping device","Stabilize the device and insert the needle at 45-degree angle to the skin","Flush with 20 mL of normal saline as soon as you can aspirate blood","Remove the syringe from the needle then block the flow with the crimping device"],a:0,t:"Procedures"},
  {id:5,q:"While providing care following an earthquake, many victims are experiencing respiratory distress. This is MOST likely due to:",o:["Dust suffocation","Carbon monoxide","Thoracic barotrauma","Infectious pneumonia"],a:0,t:"Trauma/Disaster"},
  {id:6,q:"When washing your hands after a call, you should:",o:["Wash your hands for at least 10 seconds","Use an antimicrobial, alcohol-based foam or gel","Wash with cold water and let your hands air dry","Scrub vigorously with an antibacterial gel"],a:1,t:"Infection Control"},
  {id:7,q:"___ is/are the fastest and most powerful form of radiation and can easily penetrate through lead.",o:["Alpha rays","Beta rays","Gamma rays","Neutron energy"],a:3,t:"Hazmat"},
  {id:8,q:"Which of the following would cause hypoglycemia in the patient with type 1 diabetes?",o:["Insulin underdose","Too much insulin","Too little food","Strenuous exertion"],a:1,t:"Endocrine"},
  {id:9,q:"Treatment for cyanide poisoning may include:",o:["Amyl nitrite","Methylene red","Sodium","Hydroxocobalamin"],a:0,t:"Toxicology"},
  {id:10,q:"The single MOST common cause of seizures in both term and preterm infants is:",o:["Intracranial hemorrhaging","Hypoxic ischemic encephalopathy","Congenital or developmental defects","A severe derangement in electrolytes"],a:1,t:"Pediatrics"},
  {id:11,q:"Which of the following medications would be the MOST acceptable alternative to morphine for analgesia in patients with an acute coronary syndrome?",o:["Versed","Fentanyl","Diazepam","Ibuprofen"],a:1,t:"Cardiology"},
  {id:12,q:"The MOST common device used to provide positive-pressure ventilation to a newborn in the prehospital setting is a:",o:["T-piece resuscitator","Self-inflating bag-mask device","Flow-inflating bag-mask device","Manually triggered ventilator"],a:1,t:"Neonatology"},
  {id:13,q:"Which of the following is a characteristic of multifocal atrial tachycardia?",o:["QRS complexes less than 0.11 seconds in duration","Non-visible P waves with a rapid ventricular rate","P waves and PR intervals that vary in shape and duration","Regular R-R intervals with a rate less than 150 beats/min"],a:2,t:"Cardiology"},
  {id:14,q:"You and your partner respond to an explosion at the courthouse with multiple victims. At this scene, it is most important for you to:",o:["Avoid unnecessarily moving objects to preserve evidence","Immediately report to the incident commander for instructions","Anticipate that a secondary explosive device is on the premises","Quickly establish an initial triage"],a:2,t:"Trauma/Disaster"},
  {id:15,q:"Which of the following statements regarding radiation is correct?",o:["Radiation is unlimited as to how far it can travel through the atmosphere","Alpha radiation can travel several miles before losing its radioactivity","In most cases, moving 100 feet away from the radiation source is adequate","It is impossible to recognize the type of radiation emitted from a given source"],a:3,t:"Hazmat"},
  {id:16,q:"When assessing the abdomen of a woman who is 36 weeks pregnant, you should expect it to be:",o:["Rigid and distended","Firm and nontender","Enlarged and tender","Distended and guarded"],a:1,t:"OB/GYN"},
  {id:17,q:"When caring for a child with a ventricular shunt or gastrostomy tube, it is important to:",o:["Provide supportive care only and rapidly transport","Recognize that the caregiver is a key resource whose expertise should be utilized","Assure the caregiver you can care for the child and recommend they follow the ambulance","Obtain a complete medical history then develop a treatment plan"],a:1,t:"Pediatrics"},
  {id:18,q:"Which of the following events occur during the third stage of labor?",o:["Crowning","Placental delivery","Delivery of the baby","Mucous plug expulsion"],a:1,t:"OB/GYN"},
  {id:19,q:"A decrease in adrenal hormone production will result in which of the following symptoms?",o:["Weakness","Hypotension","Hydration","Inability to respond"],a:0,t:"Endocrine"},
  {id:20,q:"Which of the following clinical findings is suggestive of left-sided heart failure?",o:["An S3 gallop","Sacral edema","Crackles in the lungs","Shortness of breath"],a:2,t:"Cardiology"},
  {id:21,q:"Which of the following is a potential complication of pelvic inflammatory disease?",o:["Uterine rupture","Ectopic pregnancy","Respiratory failure","Urinary tract infection"],a:1,t:"OB/GYN"},
  {id:22,q:"The __________ represents the end of ventricular depolarization and the beginning of repolarization.",o:["J point","T wave","ST segment","T-P interval"],a:0,t:"Cardiology"},
  {id:23,q:"In which of the following situations would a transfusion reaction MOST likely occur?",o:["A person with type AB blood receives type O blood","A person with type O blood receives type AB blood","A person with type A-negative blood receives type O blood","A person with type B-positive blood receives type B-positive blood"],a:1,t:"Hematology"},
  {id:24,q:"An 80-year-old woman vomiting bright red blood, BP 76/56, pulse 76 weak, on Toprol and ibuprofen. Which statement is MOST correct?",o:["Suspect shock from lower GI bleeding, start two large-bore IVs, infuse NS until SBP >90","Gross hematemesis suggests GI bleeding; avoid isotonic crystalloid due to CHF","Probably a bleeding peptic ulcer from ibuprofen; lack of tachycardia is due to the beta blocker","Vital signs are from medications; pallor and diaphoresis are most likely from hypoglycemia"],a:2,t:"GI"},
  {id:25,q:"An elderly woman with COPD has peripheral edema, jugular vein engorgement on abdominal pressure, takes a 'water pill' and Vasotec. You should:",o:["Expect to hear crackles when you auscultate her lungs","Suspect acute right heart failure and administer oxygen","Start an IV of normal saline and give her a 250-mL bolus","Conclude that she has been noncompliant with her diuretic"],a:1,t:"Cardiology"},
  {id:26,q:"To assess a newborn's preductal oxygen saturation, you should place the pulse oximeter probe on the:",o:["Right foot","Left hand","Left foot","Right hand"],a:3,t:"Neonatology"},
  {id:27,q:"Which of the following injuries or conditions should be assigned the HIGHEST triage priority?",o:["Full-thickness burns","Respiratory distress","Cardiopulmonary arrest","Multiple long bone fractures"],a:1,t:"Trauma/Disaster"},
  {id:28,q:"Which of the following is a common central nervous system manifestation of anaphylactic shock?",o:["Hypertension","Vomiting","Anxiety","Combativeness"],a:2,t:"Immunology"},
  {id:29,q:"Using the incident command system provides a modular organizational structure that:",o:["Is overseen by the most experienced paramedic","Depends on the size and complexity of the incident","Requires a uniform approach to any major incident","Remains static in all incidents involving mass casualties"],a:1,t:"EMS Operations"},
  {id:30,q:"Which of the following ECG abnormalities is MOST consistent with hyperkalemia?",o:["Tall, peaked T waves","Prominent U waves","Prolonged QT interval","The presence of a J wave"],a:0,t:"Cardiology"},
  {id:31,q:"Which of the following ECG waveforms represents ventricular depolarization?",o:["QRS complex","U wave","T wave","ST segment"],a:0,t:"Cardiology"},
  {id:32,q:"Which of the following should make you MOST suspicious of a terrorist attack or WMD incident?",o:["You respond to a temple, church, or mosque for a patient who was assaulted","You receive a call involving multiple patients with similar signs and symptoms","A public building is evacuated when an employee notices the smell of natural gas","A government employee presents with an acute onset of a cough and dyspnea"],a:1,t:"Hazmat"},
  {id:33,q:"To maintain a neutral airway position in an unresponsive infant, you should:",o:["Slightly extend the infant's head","Pad underneath the infant's occiput","Place a towel roll under the shoulders","Insert an appropriate-sized oral airway"],a:2,t:"Pediatrics"},
  {id:34,q:"Unlike sinus tachycardia, reentry supraventricular tachycardia in infants is characterized by:",o:["A presence of P waves","An unvarying pulse rate","A history of fever or dehydration","A pulse rate greater than 180 beats/min"],a:1,t:"Pediatrics"},
  {id:35,q:"When caring for a woman with an inevitable or incomplete abortion, you should be MOST concerned with:",o:["Bleeding and shock","Severe maternal infection","Maternal emotional trauma","The risk of airway compromise"],a:0,t:"OB/GYN"},
  {id:36,q:"Which of the following symptoms are less likely to be observed in a 90-year-old patient with a severe infection?",o:["Altered mentation","Weakness","Fever","Loss of appetite"],a:2,t:"Geriatrics"},
  {id:37,q:"Tetralogy of Fallot is a combination of four heart defects. Which of the following is one of them?",o:["Atrial septal defect","Coarctation of the aorta","Right ventricular hypertrophy","Tricuspid atresia"],a:2,t:"Pediatrics"},
  {id:38,q:"Mittelschmerz is defined as:",o:["Pain that occurs outside the menstrual cycle","Two consecutively missed menstrual periods","Pain in the middle of the menstrual cycle","A sudden premature cessation of menses"],a:2,t:"OB/GYN"},
  {id:39,q:"Immediately following dialysis, a patient has BP 80/50, pulse 40 weak, sinus bradycardia on ECG. Your next action should be to:",o:["Obtain a 12-lead ECG tracing","Administer 0.5 mg of atropine sulfate","Administer a 20-mL/kg fluid bolus","Administer calcium and bicarbonate"],a:1,t:"Renal"},
  {id:40,q:"Production of clotting factors is a function of the:",o:["Kidney","Bone marrow","Liver","Spleen"],a:2,t:"Hematology"},
  {id:41,q:"An unresponsive 66-year-old with prior strokes, severe headache then passed out, poor respiratory effort, elevated BP, slow bounding pulse. You should:",o:["Give high-flow O2, monitor, start IV NS, administer 0.5 mg atropine for bradycardia","Hyperventilate at 30 breaths/min, begin transcutaneous pacing, give 25g dextrose","Intubate after preoxygenation, ventilate at 8 breaths/min, start IV NS, give 50g dextrose","Assist ventilations, apply cardiac monitor, start IV NS, assess BGL, prepare for transport"],a:3,t:"Neurology"},
  {id:42,q:"A patient who is coughing up purulent sputum is likely experiencing:",o:["An infection","Pulmonary edema","Emphysema","Dehydration"],a:0,t:"Respiratory"},

  {id:44,q:"Unlike an idioventricular rhythm, an agonal rhythm:",o:["Indicates a regular ventricular pacemaker","Is associated with a faster rate","Is associated with a lower mortality rate","Does not produce a palpable pulse"],a:3,t:"Cardiology"},
  {id:45,q:"A 66-year-old with chronic bronchitis, diffuse rhonchi, takes OTC antitussive, not compliant with home oxygen. MOST likely cause of respiratory distress:",o:["Oxygen noncompliance","Recent antitussive use","An underlying infection","Acute right heart failure"],a:1,t:"Respiratory"},
  {id:46,q:"Which of the following would the paramedic likely administer to a patient with diabetic ketoacidosis?",o:["Insulin","Isotonic fluid","Hydrocortisone","Magnesium"],a:1,t:"Endocrine"},
  {id:47,q:"A 44-year-old woman with migraine history, severe headache, nausea, photophobia, BP 170/94. MOST appropriate treatment:",o:["Assess pupils, administer O2, start IV and give morphine, transport","Place in Fowler position, administer O2, transport for definitive care","O2 as tolerated, start IV, administer ondansetron, transport without lights or siren","High-flow O2, establish vascular access, administer nitroglycerin for blood pressure"],a:2,t:"Neurology"},
  {id:48,q:"When attempting resuscitation of a child with pulseless electrical activity, you should:",o:["Administer epinephrine via ET tube if possible","Attempt to identify an underlying cause of the arrest","Perform synchronized cardioversion if the rate is fast","Give atropine if the heart rate is less than 60 beats/min"],a:1,t:"Pediatrics"},
  {id:49,q:"A patient with status asthmaticus commonly presents with:",o:["Physical exhaustion and inaudible breath sounds","Audible expiratory wheezing and severe cyanosis","Accessory muscle use and inspiratory wheezing","Compensatory respiratory alkalosis and stridor"],a:2,t:"Respiratory"},
  {id:50,q:"Which of the following statements about panic disorder is correct?",o:["Panic disorder is characterized by sudden, unexpected fear and dread","Most initial panic attacks occur without a known precipitating stressor","Men are two thirds more likely to experience panic disorder than women","Panic disorder is a random disorder that usually does not run in the family"],a:0,t:"Psych"},
  {id:51,q:"The hematocrit is the:",o:["Ratio of red blood cells to platelets","Overall proportion of red blood cells in the blood","Percentage of blood accounted for by the plasma","Percentage of hemoglobin found within red blood cells"],a:1,t:"Hematology"},
  {id:52,q:"When a disease infects large numbers of people and spreads all over the world, it is considered a(n):",o:["Endemic","Epidemic","Outbreak","Pandemic"],a:3,t:"Infection Control"},
  {id:53,q:"Which of the following statements regarding Alzheimer disease is correct?",o:["Alzheimer disease is likely not a part of the normal process of aging","Autopsy is the only way to confirm Alzheimer","The symptoms of Alzheimer disease are generally obvious at its onset","Common signs of Alzheimer disease include paranoia and delusions"],a:1,t:"Geriatrics"},
  {id:54,q:"A 74-year-old has his head cocked to one side and cannot move it. He was placed on Seroquel 2 days ago. You should:",o:["Administer 25 to 50 mg of diphenhydramine","Suspect that the patient has catatonic schizophrenia","Establish vascular access and administer naloxone","Expect to find that his blood sugar level is elevated"],a:0,t:"Psych"},
  {id:55,q:"Which of the following is a physiologic effect of histamine?",o:["Systemic vasodilation","Increased cardiac contractility","Severe bronchoconstriction","Increased vascular permeability"],a:0,t:"Immunology"},
  {id:56,q:"Which of the following signs or symptoms are consistent with meningitis in an infant?",o:["Kehr sign, vomiting, and poor skin turgor","High-pitched cry and bulging fontanelles","Low-grade fever and depressed fontanelles","High fever, drooling, and tachycardia"],a:1,t:"Pediatrics"},
  {id:57,q:"A patient with respiratory distress who is willing to lie flat:",o:["Should be intubated at once","May be acutely deteriorating","Has minimal fluid in the lungs","Likely has basilar pneumonia"],a:1,t:"Respiratory"},

let state = {

function shuffle(arr){ return [...arr].sort(()=>Math.random()-.5); }
function getPool(){ return state.topic==="All"?ALL_QUESTIONS:ALL_QUESTIONS.filter(q=>q.t===state.topic); }
function color(t){ return TOPIC_COLORS[t]||"#64748b"; }

// ── Build topic pills ─────────────────────────────────────────────────────────
function buildPills(){
  const c = document.getElementById("topic-pills");
  c.innerHTML = TOPICS.map(t=>{
    const col = color(t);
    const active = state.topic===t;
    return `<button class="pill${active?" active":""}" data-topic="${t}"
      style="border-color:${active?col:"#1e293b"};background:${active?col+"22":"transparent"};color:${active?col:"#475569"}">${t}</button>`;
  }).join("");
  c.querySelectorAll(".pill").forEach(b=>{
    b.addEventListener("click",()=>{ state.topic=b.dataset.topic; startQuiz(); buildPills(); });
  });
}

// ── Quiz ──────────────────────────────────────────────────────────────────────
function startQuiz(){
  state.questions = shuffle(getPool());
  state.idx=0; state.selected=null; state.score={correct:0,wrong:0}; state.wrongList=[];
  showSection("quiz");
  renderQuestion();
}

function renderQuestion(){
  const q = state.questions[state.idx];
  if(!q){ showResults(); return; }
  const col = color(q.t);
  const pct = (state.idx / state.questions.length)*100;

  document.getElementById("progress-bar-fill").style.width = pct+"%";
  document.getElementById("progress-bar-fill").style.background = col;
  document.getElementById("progress-text").textContent = `${state.idx+1} / ${state.questions.length}`;

  document.getElementById("q-meta").innerHTML =
    `<span class="topic-badge" style="background:${col}22;color:${col};border-color:${col}44">${q.t}</span>
     <span class="q-num">Q${q.id}</span>`;
  document.getElementById("question-card").style.borderColor = col+"33";
  document.getElementById("question-text").textContent = q.q;

  const opts = document.getElementById("options");
  opts.innerHTML = q.o.map((opt,i)=>`
    <button class="option-btn" data-i="${i}">
      <span class="opt-letter" style="background:#1e293b;color:#64748b">${String.fromCharCode(65+i)}</span>
      <span>${opt}</span>
    </button>`).join("");
  opts.querySelectorAll(".option-btn").forEach(b=>{
    b.addEventListener("click",()=>pickAnswer(parseInt(b.dataset.i)));
  });

  document.getElementById("feedback-row").style.display = "none";
  document.getElementById("score-strip").style.display = "flex";
  updateStrip();
}

function pickAnswer(i){
  if(state.selected!==null) return;
  state.selected=i;
  const q = state.questions[state.idx];
  const correct = i===q.a;
  if(correct) state.score.correct++; else { state.score.wrong++; state.wrongList.push(q); }

  document.querySelectorAll(".option-btn").forEach((b,bi)=>{
    b.classList.add("answered");
    const letter = b.querySelector(".opt-letter");
    if(bi===q.a){ b.classList.add("correct"); letter.style.background="#22c55e33"; letter.style.color="#22c55e"; }
    else if(bi===i){ b.classList.add("wrong"); letter.style.background="#ef444433"; letter.style.color="#ef4444"; }
  });

  const fb = document.getElementById("feedback-box");
  fb.className = ""; fb.classList.add(correct?"correct":"wrong");
  fb.textContent = correct ? "✓ Correct!" : `✗ Correct answer: ${q.o[q.a]}`;
  document.getElementById("feedback-row").style.display = "flex";
  document.getElementById("next-btn").textContent = state.idx+1>=state.questions.length ? "Finish" : "Next →";
  updateStrip();
}

function updateStrip(){
  const rem = state.questions.length - state.idx - (state.selected!==null?1:0);
  document.getElementById("strip-correct").textContent = `✓ ${state.score.correct}`;
  document.getElementById("strip-wrong").textContent = `✗ ${state.score.wrong}`;
  document.getElementById("strip-remaining").textContent = `${rem} remaining`;
}

function showResults(){
  showSection("results");
  const total = state.questions.length;
  const pct = Math.round(state.score.correct/total*100);
  document.getElementById("result-emoji").textContent = pct>=80?"🎉":pct>=60?"📖":"💪";
  document.getElementById("result-sub").textContent = `${total} questions · ${state.topic}`;
  document.getElementById("res-correct").textContent = state.score.correct;
  document.getElementById("res-wrong").textContent = state.score.wrong;
  document.getElementById("res-pct").textContent = pct+"%";

  const wr = document.getElementById("wrong-review");
  if(state.wrongList.length){
    wr.innerHTML = `<p id="wrong-list-title">Review These (${state.wrongList.length})</p>`+
      state.wrongList.map(wq=>`
        <div class="wrong-item">
          <div class="wi-meta">Q${wq.id} · ${wq.t}</div>
          <div class="wi-q">${wq.q}</div>
          <div class="wi-ans">✓ ${wq.o[wq.a]}</div>
        </div>`).join("");
  } else { wr.innerHTML=""; }
}

// ── Browse ────────────────────────────────────────────────────────────────────
function renderBrowse(){
  const search = state.browseSearch.toLowerCase();
  const pool = getPool().filter(q=>
    q.q.toLowerCase().includes(search)||q.o.some(o=>o.toLowerCase().includes(search)));
  document.getElementById("browse-count").textContent = `${pool.length} questions`;
  const list = document.getElementById("browse-list");
  list.innerHTML = pool.map(q=>{
    const col = color(q.t);
    const revealed = state.browseRevealed[q.id];
    return `<div class="browse-card" id="bc-${q.id}" style="border-color:${revealed?col+"55":"#1e293b"}">
      <div class="browse-card-header">
        <div>
          <span style="color:#334155;font-size:12px;font-weight:700;margin-right:8px">Q${q.id}</span>
          <span class="topic-badge" style="background:${col}22;color:${col};border-color:${col}44;font-size:10px">${q.t}</span>
        </div>
        <button class="reveal-btn" data-id="${q.id}">${revealed?"Hide":"Answer"}</button>
      </div>
      <p class="browse-q">${q.q}</p>
      <div>${q.o.map((opt,i)=>{
        let cls="browse-opt";
        if(revealed){ cls+= i===q.a?" revealed-correct":" revealed-wrong"; }
        return `<div class="${cls}"><span style="font-family:monospace;color:${revealed&&i===q.a?"#22c55e":"#334155"};flex-shrink:0">${String.fromCharCode(65+i)}.</span><span>${opt}</span></div>`;
      }).join("")}</div>
    </div>`;
  }).join("");
  list.querySelectorAll(".reveal-btn").forEach(b=>{
    b.addEventListener("click",()=>{
      const id=parseInt(b.dataset.id);
      state.browseRevealed[id]=!state.browseRevealed[id];
      renderBrowse();
    });
  });
}

// ── Stats ─────────────────────────────────────────────────────────────────────
function renderStats(){
  const counts = TOPICS.filter(t=>t!=="All").map(t=>({
    t, count:ALL_QUESTIONS.filter(q=>q.t===t).length, col:color(t)
  })).sort((a,b)=>b.count-a.count);
  const max = Math.max(...counts.map(c=>c.count));
  document.getElementById("stats-title").textContent = `${ALL_QUESTIONS.length} total questions by topic`;
  document.getElementById("stats-bars").innerHTML = counts.map(({t,count,col})=>`
    <div class="stat-row">
      <div class="stat-row-label">
        <span class="stat-label">${t}</span>
        <span class="stat-count" style="color:${col}">${count}</span>
      </div>
      <div class="stat-bar-bg">
        <div class="stat-bar-fill" style="width:${(count/max)*100}%;background:${col}"></div>
      </div>
    </div>`).join("");
  const cardioQ = counts.find(c=>c.t==="Cardiology")?.count||0;
  const pedQ = counts.find(c=>c.t==="Pediatrics")?.count||0;
  document.getElementById("summary-grid").innerHTML = [
    ["Total Questions",ALL_QUESTIONS.length,"#3b82f6"],
    ["Topics Covered",counts.length,"#22c55e"],
    ["Cardiology Qs",cardioQ,"#ef4444"],
    ["Pediatric Qs",pedQ,"#8b5cf6"],
  ].map(([l,v,c])=>`<div class="summary-card"><div class="summary-val" style="color:${c}">${v}</div><div class="summary-label">${l}</div></div>`).join("");
}

// ── Navigation ────────────────────────────────────────────────────────────────
function showSection(sec){
  document.getElementById("quiz-mode").style.display = "none";
  document.getElementById("results-screen").style.display = "none";
  document.getElementById("browse-mode").style.display = "none";
  document.getElementById("stats-mode").style.display = "none";
  document.getElementById("restart-btn").style.display = sec==="quiz"||sec==="results"?"inline-block":"none";

  if(sec==="quiz") document.getElementById("quiz-mode").style.display="block";
  else if(sec==="results") document.getElementById("results-screen").style.display="block";
  else if(sec==="browse") document.getElementById("browse-mode").style.display="block";
  else if(sec==="stats") document.getElementById("stats-mode").style.display="block";

  document.querySelectorAll(".tab").forEach(t=>t.classList.toggle("active", t.dataset.tab===state.mode));
}

// ── Event Listeners ───────────────────────────────────────────────────────────
document.querySelectorAll(".tab").forEach(tab=>{
  tab.addEventListener("click",()=>{
    state.mode = tab.dataset.tab;
    showSection(state.mode);
    if(state.mode==="quiz") startQuiz();
    else if(state.mode==="browse") renderBrowse();
    else if(state.mode==="stats") renderStats();
  });
});

document.getElementById("next-btn").addEventListener("click",()=>{
  state.idx++; state.selected=null;
  if(state.idx>=state.questions.length) showResults();
  else renderQuestion();
});

document.getElementById("restart-btn").addEventListener("click",()=>{ state.mode="quiz"; buildPills(); startQuiz(); });
document.getElementById("try-again-btn").addEventListener("click",()=>{ state.mode="quiz"; buildPills(); startQuiz(); });

document.getElementById("browse-search").addEventListener("input",e=>{
  state.browseSearch=e.target.value; renderBrowse();
});

// ── Init ──────────────────────────────────────────────────────────────────────
buildPills();
startQuiz();
</script>

</body>
</html>
